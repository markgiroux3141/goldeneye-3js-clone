<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas { display: block; width: 100%; height: 100%; }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-family: Arial, sans-serif;
      cursor: pointer;
      z-index: 10;
    }
    #overlay h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    #overlay p { font-size: 1.1rem; opacity: 0.8; }
    #overlay.hidden { display: none; }

    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      width: 56px; height: 56px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h1>3D World</h1>
    <p>Click to play</p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.5;">WASD to move &middot; Mouse to look &middot; Space to jump &middot; ESC to pause</p>
  </div>
  <img id="crosshair" src="/textures/misc/crosshairs.png" alt="" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
